services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: canvas_data
      MYSQL_USER: canvas_user
      MYSQL_PASSWORD: canvas_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=mysql+pymysql://canvas_user:canvas_password@db:3306/canvas_data
    depends_on:
      - db
    volumes:
      # Maps your Mac's local ~/.Acalanes folder to the container's home folder
      - ~/.Acalanes:/root/.Acalanes:ro 

volumes:
  mysql_data: