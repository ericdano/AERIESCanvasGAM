services:
  web:
    build: .
    container_name: teacher_portal_web
    restart: unless-stopped
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.enableCORS=false --server.enableXsrfProtection=false
    ports:
      - "8501:8501"
    environment:
      # Keeps your app running in Pacific Time
      - TZ=America/Los_Angeles
    volumes:
      # Maps your Mac's config folder securely into the container
      - ~/.Acalanes:/root/.Acalanes:ro 
    networks:
      - default
      - proxy-network

  scheduler:
    build: .
    container_name: teacher_portal_scheduler
    restart: unless-stopped
    command: python sync.py
    environment:
      # Keeps the 6:30 AM timer synced to Pacific Time
      - TZ=America/Los_Angeles
    volumes:
      - ~/.Acalanes:/root/.Acalanes:ro
    # THE FIX: Custom Python Heartbeat Check
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; exit(0 if os.path.exists('/tmp/heartbeat.txt') and time.time() - os.path.getmtime('/tmp/heartbeat.txt') < 180 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
networks:
  proxy-network:
    external: true